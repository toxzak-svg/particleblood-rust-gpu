<script type="module">
import init, * as bindings from '/rustyparts-a89a029c2b716f09.js';

    <script>
      (function() {
        var KEY_PREFIX = 'rustyparts_seen_';
        function storyKey() {
          return KEY_PREFIX + (window.location.pathname || '') + (window.location.search || '') + (window.location.hash || '');
        }
        window.rustypartsShouldRunStory = function() {
          try {
            return !localStorage.getItem(storyKey());
          } catch (e) {
            return true;
          }
        };
        window.rustypartsShowGone = function() {
          var gone = document.getElementById('story-gone');
          var main = document.getElementById('story-main');
          if (gone) gone.classList.add('is-visible');
          if (main) main.classList.add('is-hidden');
        };
        window.rustypartsOnStoryComplete = function() {
          try {
            localStorage.setItem(storyKey(), '1');
          } catch (e) {}
          window.rustypartsShowGone();
        };
        document.addEventListener('DOMContentLoaded', function() {
          // Parse URL parameters
          var params = new URLSearchParams(window.location.search);
          var isStoryMode = params.get('m') === '1' || params.get('m') === 'true';
          var storyText = params.get('t') || '';
          
          if (isStoryMode) {
            document.body.dataset.storyMode = 'true';
            // Call Rust to initialize story mode
            if (window.wasm_bindgen && window.wasm_bindgen.initStoryMode) {
              window.wasm_bindgen.initStoryMode(storyText, true);
            }
          }
          
          function doShare(btn) {
            // Get current shape text from Rust
            var currentText = '';
            if (window.wasm_bindgen && window.wasm_bindgen.getCurrentShapeText) {
              currentText = window.wasm_bindgen.getCurrentShapeText();
            }
            
            // Generate shareable URL
            var baseUrl = window.location.origin + window.location.pathname;
            var shareUrl = baseUrl + '?m=1';
            if (currentText) {
              shareUrl += '&t=' + encodeURIComponent(currentText);
            }
            
            var title = document.title || 'RustyParts';
            var text = 'A moment — open to watch once, then it melts away.';
            if (navigator.share) {
              navigator.share({ url: shareUrl, title: title, text: text }).catch(function() {});
            } else {
            var url = window.location.href;
            var title = document.title || 'RustyParts';
            var text = 'A moment — open to watch once, then it melts away.';
            if (navigator.share) {
              navigator.share({ url: url, title: title, text: text }).catch(function() {});
            } else {
              navigator.clipboard.writeText(url).then(function() {
                if (btn) { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Share'; }, 1500); }
              }).catch(function() {});
            }
          }
          ['shareBtnMain', 'shareBtnGone'].forEach(function(id) {
            var btn = document.getElementById(id);
            if (btn) btn.addEventListener('click', function() { doShare(btn); });
          });
        });
        window.rustypartsDebugLog = function(payload) {
          try {
            var body = typeof payload === 'string' ? payload : JSON.stringify(payload);
            fetch('http://127.0.0.1:7698/ingest/f1a79e5b-a905-4d9d-bb11-de0538786a7f', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '759d2c' },
              body: body
            }).catch(function() {});
          } catch (e) {}
        };
      })();
    </script>

  <body>
    <div id="story-main">
    <canvas id="app" aria-label="Interactive particle field"></canvas>
    <div class="hud">
      <button type="button" id="shareBtnMain" class="share-btn share-btn-main" aria-label="Share link">Share</button>
      <div class="panel is-collapsed" id="controlPanel">
        <div class="panel-head">
          <div class="panel-title">Controls</div>
          <button
            type="button"
            id="panelToggle"
            class="panel-toggle"
            aria-controls="panelBody"
            aria-expanded="false"
          >
            Expand
          </button>
        </div>
        <div class="panel-body" id="panelBody">
          <!-- Particles Section -->
          <div class="section">
            <div class="section-header">
              <span class="label">Particles</span>
            </div>
            <div class="row">
              <input type="range" id="particleSlider" min="1" max="100" value="50" aria-label="Particle amount" class="slider-full" />
              <output id="particleCountOut" class="stat-pill" aria-live="polite">0 particles</output>
            </div>
          </div>
          
          <!-- Effects Section -->
          <div class="section">
            <div class="section-header">
              <span class="label">Effects</span>
            </div>
            <div class="row">
              <div class="seg" id="fxSeg" aria-label="Visual effects preset">
                <button type="button" data-fx="neon" class="is-active">Neon</button>
                <button type="button" data-fx="prism">Prism</button>
                <button type="button" data-fx="plasma">Plasma</button>
              </div>
            </div>
          </div>
          
          <!-- Text/Shape Section -->
          <div class="section">
            <div class="section-header">
              <span class="label">Text</span>
            </div>
            <div class="row row-shape">
              <div class="shape-controls">
                <span class="shape-hint">Text entry moved to the bottom dot</span>
                <div class="seg" id="layoutSeg" aria-label="Text layout mode">
                  <button type="button" data-layout="single" class="is-active">Big</button>
                  <button type="button" data-layout="multi">Many</button>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="seg shape-actions" id="shapeSeg">
                <button type="button" id="formBtn">Form</button>
                <button type="button" id="meltBtn">Melt</button>
              </div>
            </div>
          </div>
          
          <!-- Help Section -->
          <div class="row help">
            <span>Move: paint</span>
            <span>Hold: attract</span>
            <span>Tap: toggle</span>
            <span>Enter: form</span>
            <span>1/2/3: FX</span>
            <span>M/T</span>
          </div>
        </div>
      </div>
    </div>

    <div class="app-credits" aria-hidden="true">
      <span id="footerParticleCount">0</span> · Powered by Rust · ZWM
    </div>

    <div class="text-entry-launcher">
      <button
        type="button"
        id="textEntryDot"
        class="entry-dot"
        aria-controls="textEntrySheet"
        aria-expanded="false"
        aria-label="Open text entry"
      ></button>
    </div>

    <div class="text-entry-sheet" id="textEntrySheet" aria-hidden="true">
      <div class="text-entry-card">
        <div class="text-entry-head">
          <span class="text-entry-title">Type Your Text</span>
          <button type="button" id="textEntryClose" class="text-entry-close">Close</button>
        </div>
        <input
          id="shapeInput"
          type="text"
          value=""
          maxlength="18"
          autocomplete="off"
          spellcheck="false"
          aria-label="Shape text"
          placeholder="Enter custom text"
        />
        <div class="text-entry-actions">
          <button type="button" id="textEntryApply">Form</button>
        </div>
      </div>
    </div>
    </div>

    <div id="story-gone" class="story-gone" aria-live="polite" aria-hidden="true">
      <p class="story-gone-title">This moment is gone.</p>
      <p class="story-gone-sub">It was only for you, once.</p>
      <button type="button" id="shareBtnGone" class="share-btn" aria-label="Share">Share</button>
    </div>
  </body>
