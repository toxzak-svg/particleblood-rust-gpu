<script type="module">
import init, * as bindings from '/rustyparts-ff641a7134873569.js';
const wasm = await init({ module_or_path: '/rustyparts-ff641a7134873569_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
  <link rel="modulepreload" href="/rustyparts-ff641a7134873569.js" crossorigin="anonymous" integrity="sha384-0jvR7Yggl0zx3Wdn0BeNIEcE5ek4mAntqCF4CGUUQKBDHPm/3LfR076RxzxgPyDX"><link rel="preload" href="/rustyparts-ff641a7134873569_bg.wasm" crossorigin="anonymous" integrity="sha384-SP745gjHbrlfCNjgDZHqfb31oP8YaGI5Ezx/Q0JY6sjtsHnigkbj5twc9K3OMo3+" as="fetch" type="application/wasm"></head>
  <body>
    <canvas id="app" aria-label="Interactive particle field"></canvas>
    <div class="hud">
      <div class="panel is-collapsed" id="controlPanel">
        <div class="panel-head">
          <div class="panel-title">Controls</div>
          <button
            type="button"
            id="panelToggle"
            class="panel-toggle"
            aria-controls="panelBody"
            aria-expanded="false"
          >
            Expand
          </button>
        </div>
        <div class="panel-body" id="panelBody">
          <!-- Particles Section -->
          <div class="section">
            <div class="section-header">
              <span class="label">Particles</span>
            </div>
            <div class="row">
              <input type="range" id="particleSlider" min="1" max="100" value="50" aria-label="Particle amount" class="slider-full" />
              <output id="particleCountOut" class="stat-pill" aria-live="polite">0 particles</output>
            </div>
          </div>
          
          <!-- Effects Section -->
          <div class="section">
            <div class="section-header">
              <span class="label">Effects</span>
            </div>
            <div class="row">
              <div class="seg" id="fxSeg" aria-label="Visual effects preset">
                <button type="button" data-fx="neon" class="is-active">Neon</button>
                <button type="button" data-fx="prism">Prism</button>
                <button type="button" data-fx="plasma">Plasma</button>
              </div>
            </div>
          </div>
          
          <!-- Text/Shape Section -->
          <div class="section">
            <div class="section-header">
              <span class="label">Text</span>
            </div>
            <div class="row row-shape">
              <div class="shape-controls">
                <span class="shape-hint">Text entry moved to the bottom dot</span>
                <div class="seg" id="layoutSeg" aria-label="Text layout mode">
                  <button type="button" data-layout="single" class="is-active">Big</button>
                  <button type="button" data-layout="multi">Many</button>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="seg shape-actions" id="shapeSeg">
                <button type="button" id="formBtn">Form</button>
                <button type="button" id="meltBtn">Melt</button>
              </div>
            </div>
          </div>
          
          <!-- Help Section -->
          <div class="row help">
            <span>Move: paint</span>
            <span>Hold: attract</span>
            <span>Tap: toggle</span>
            <span>Enter: form</span>
            <span>1/2/3: FX</span>
            <span>M/T</span>
          </div>
        </div>
      </div>
    </div>

    <div class="text-entry-launcher">
      <button
        type="button"
        id="textEntryDot"
        class="entry-dot"
        aria-controls="textEntrySheet"
        aria-expanded="false"
        aria-label="Open text entry"
      ></button>
    </div>

    <div class="text-entry-sheet" id="textEntrySheet" aria-hidden="true">
      <div class="text-entry-card">
        <div class="text-entry-head">
          <span class="text-entry-title">Type Your Text</span>
          <button type="button" id="textEntryClose" class="text-entry-close">Close</button>
        </div>
        <input
          id="shapeInput"
          type="text"
          value=""
          maxlength="18"
          autocomplete="off"
          spellcheck="false"
          aria-label="Shape text"
          placeholder="Enter custom text"
        />
        <div class="text-entry-actions">
          <button type="button" id="textEntryApply">Form</button>
        </div>
      </div>
    </div>
  <script>"use strict";

(function () {

    const address = '{{__TRUNK_ADDRESS__}}';
    const base = '{{__TRUNK_WS_BASE__}}';
    let protocol = '';
    protocol =
        protocol
            ? protocol
            : window.location.protocol === 'https:'
                ? 'wss'
                : 'ws';
    const url = protocol + '://' + address + base + '.well-known/trunk/ws';

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";
            style.position = "fixed";
            style.top = "0";
            style.left = "0";
            style.backgroundColor = "rgba(222, 222, 222, 0.5)";
            style.fontFamily = "sans-serif";
            // not sure that's the right approach
            style.zIndex = "1000000";
            style.backdropFilter = "blur(1rem)";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();

})()
</script></body>
</html>
