<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RustyParts</title>
    <link rel="stylesheet" href="/styles-6f4f25eb5d548bb0.css" integrity="sha384-qB5k/2rBOnavaKjkmJI4kCBmWieXTdIrPpqJh800dqGTV9Ja4WITW2RYt9VdjXoy"/>
    
<script type="module">
import init, * as bindings from '/rustyparts-768cf41da722f3ec.js';
const wasm = await init({ module_or_path: '/rustyparts-768cf41da722f3ec_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
  <link rel="modulepreload" href="/rustyparts-768cf41da722f3ec.js" crossorigin="anonymous" integrity="sha384-FBaG8exTyUaLen0Yc6h7h01Po43wGcgtvIgDoWhJODT1K1ok3UfoEEvzR9j/4a2u"><link rel="preload" href="/rustyparts-768cf41da722f3ec_bg.wasm" crossorigin="anonymous" integrity="sha384-cevm/l7fxu/sTNY/vVjJ0V305h6ksTvs9whWSLKuogncRbH9+0cjq0l0XT4pG28q" as="fetch" type="application/wasm"></head>
  <body>
    <canvas id="app" aria-label="Interactive particle field"></canvas>
    <div class="hud">
      <div class="panel is-collapsed" id="controlPanel">
        <div class="panel-head">
          <div class="panel-title">Controls</div>
          <button
            type="button"
            id="panelToggle"
            class="panel-toggle"
            aria-controls="panelBody"
            aria-expanded="false"
          >
            Expand
          </button>
        </div>
        <div class="panel-body" id="panelBody">
          <!-- Particles Section -->
          <div class="section">
            <div class="section-header">
              <span class="label">Particles</span>
            </div>
            <div class="row">
              <input type="range" id="particleSlider" min="1" max="100" value="50" aria-label="Particle amount" class="slider-full" />
              <output id="particleCountOut" class="stat-pill" aria-live="polite">0 particles</output>
            </div>
          </div>
          
          <!-- Effects Section -->
          <div class="section">
            <div class="section-header">
              <span class="label">Effects</span>
            </div>
            <div class="row">
              <div class="seg" id="fxSeg" aria-label="Visual effects preset">
                <button type="button" data-fx="neon" class="is-active">Neon</button>
                <button type="button" data-fx="prism">Prism</button>
                <button type="button" data-fx="plasma">Plasma</button>
              </div>
            </div>
          </div>
          
          <!-- Text/Shape Section -->
          <div class="section">
            <div class="section-header">
              <span class="label">Text</span>
            </div>
            <div class="row row-shape">
              <div class="shape-controls">
                <input id="shapeInput" type="text" value="TOUCH!" maxlength="18" aria-label="Shape text" />
                <div class="seg" id="layoutSeg" aria-label="Text layout mode">
                  <button type="button" data-layout="single" class="is-active">Big</button>
                  <button type="button" data-layout="multi">Many</button>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="seg shape-actions" id="shapeSeg">
                <button type="button" id="formBtn">Form</button>
                <button type="button" id="meltBtn">Melt</button>
              </div>
            </div>
          </div>
          
          <!-- Help Section -->
          <div class="row help">
            <span>Move: paint</span>
            <span>Hold: attract</span>
            <span>Tap: toggle</span>
            <span>Enter: form</span>
            <span>1/2/3: FX</span>
            <span>M/T</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
